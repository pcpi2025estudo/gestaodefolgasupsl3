  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDY-OGSuZk7VF5do5FV2IOIH43O3aOzR2U",
    authDomain: "gestor-de-folgas-upsl3.firebaseapp.com",
    projectId: "gestor-de-folgas-upsl3",
    storageBucket: "gestor-de-folgas-upsl3.firebasestorage.app",

    appId: "1:304386193354:web:eadd9f9dbb9cd8910f8133"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

    try { const snap = await getDoc(doc(db,"sistema","dados")); return snap.exists()?snap.data():null; } catch(e){return null;}

<body>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const ADMIN_PASSWORD = "ADM123@53Ap";
const COR = "#1a5c2e";
const COR2 = "#c8960a";
const TIPOS_DOC = ["Atestado médico","Declaração","Atestado de comparecimento","Declaração de acompanhante","Outro"];
const REGIMES = ["Diarista","4x10 Seg-Qui","4x10 Ter-Sex","Plantonista 12x36","Chefe 24x72"];
const TURNOS = ["Dia","Noite"];
const PLANTOES = ["A","B"];
const STATUS_MAP = {
  pendente:{bg:"#f59e0b",color:"#fff",label:"Pendente"},
  emanalise:{bg:"#eab308",color:"#fff",label:"Em análise"},
  deferida:{bg:"#16a34a",color:"#fff",label:"Deferida"},
  indeferida:{bg:"#dc2626",color:"#fff",label:"Indeferida"},
};

async function loadStorage(){
  if(window._loadData) return await window._loadData();
  try{const v=localStorage.getItem("folgas_data");return v?JSON.parse(v):null;}catch{return null;}
}
async function saveStorage(data){
  if(window._saveData) return await window._saveData(data);
  try{localStorage.setItem("folgas_data",JSON.stringify(data));}catch{}
}
function genId(){return Math.random().toString(36).slice(2,10);}
function parseDate(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function addDays(s,n){const d=parseDate(s);d.setDate(d.getDate()+n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function isDSR(srv,ds){
  if(!ds||ds.length<10)return false;
  const d=parseDate(ds),dow=d.getDay();
  if(dow===0||dow===6)return true;
  const r=srv.regime||"";
  if(r==="Diarista")return false;
  if(r==="4x10 Seg-Qui")return dow===5;
  if(r==="4x10 Ter-Sex")return dow===1;
  if((r==="Plantonista 12x36"||r==="Chefe 24x72")&&srv.inicioPlantao){
    const ini=parseDate(srv.inicioPlantao);
    const diff=Math.round((d-ini)/(864e5));
    if(diff<0)return false;
    return(diff%(r==="Chefe 24x72"?4:2))!==0;
  }
  return false;
}
function isFDS(ds){if(!ds||ds.length<10)return false;return[0,6].includes(parseDate(ds).getDay());}
function getTurno(srv){
  if(srv.regime==="Chefe 24x72")return"Ambos";
  if(["Diarista","4x10 Seg-Qui","4x10 Ter-Sex"].includes(srv.regime||""))return"Dia";
  return srv.turno||"Dia";
}
function getFB(f=""){const u=(f||"").toUpperCase();if(u.includes("APT"))return"APT";if(u.includes("ASP"))return"ASP";if(u.includes("CHEFE"))return"Chefe de Plantão";return f;}
function validar(srv,ds,solicitacoes,servidores){
  const e=[];
  if(!ds||ds.length<10){e.push("Data inválida.");return e;}
  if(isFDS(ds)){e.push("Não é permitido solicitar folga em finais de semana.");return e;}
  if(isDSR(srv,ds)){e.push("Esta data corresponde ao DSR do servidor.");return e;}
  if(solicitacoes.find(s=>s.servidorId===srv.id&&s.data===ds&&s.status!=="indeferida")){e.push("Já existe uma solicitação para esta data.");return e;}
  const cc=solicitacoes.find(s=>s.servidorId===srv.id&&(s.data===addDays(ds,-1)||s.data===addDays(ds,1))&&s.status!=="indeferida");
  if(cc){e.push(`Folga consecutiva não permitida. Já existe solicitação em ${cc.data}.`);return e;}
  const fb=getFB(srv.funcao),ts=getTurno(srv);
  if(["APT","ASP","Chefe de Plantão"].includes(fb)){
    const nd=solicitacoes.filter(s=>s.data===ds&&s.status!=="indeferida");
    if(fb==="Chefe de Plantão"){
      if(nd.filter(s=>{const x=servidores.find(v=>v.id===s.servidorId);return x&&x.id!==srv.id&&getFB(x.funcao)==="Chefe de Plantão";}).length>=1)
        e.push("Já existe um Chefe de Plantão com folga nesta data.");
    } else {
      const ct=t=>nd.filter(s=>{const x=servidores.find(v=>v.id===s.servidorId);if(!x||x.id===srv.id)return false;if(getFB(x.funcao)!==fb)return false;const to=getTurno(x);return to===t||to==="Ambos";}).length;
      if((ts==="Dia"||ts==="Ambos")&&ct("Dia")>=1)e.push(`Já existe 1 ${fb} com folga no turno Dia nesta data.`);
      if((ts==="Noite"||ts==="Ambos")&&ct("Noite")>=1)e.push(`Já existe 1 ${fb} com folga no turno Noite nesta data.`);
    }
  }
  return e;
}
function fileToBase64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});}
function downloadBase64(b64,nome){const a=document.createElement("a");a.href=b64;a.download=nome;a.click();}
function exportCSV(rows,filename){
  if(!rows.length)return;
  const csv=[Object.keys(rows[0]).join(","),...rows.map(r=>Object.values(r).map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(","))].join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
const S={
  wrap:{maxWidth:700,margin:"0 auto"},
  header:{background:COR,padding:"16px 20px",borderRadius:"10px 10px 0 0"},
  sub:{background:COR2,padding:"6px 20px"},
  body:{background:"#fff",border:"1px solid #e5e7eb",borderTop:"none",borderRadius:"0 0 10px 10px",padding:"1.5rem"},
};
function Header({subtitle}){return(<><div style={S.header}><div style={{color:"#fff"}}><div style={{fontSize:11,opacity:.75,letterSpacing:.5,marginBottom:2}}>ESTADO DO MARANHÃO · SEAP MA</div><div style={{fontSize:15,fontWeight:600,lineHeight:1.3}}>Sistema Penitenciário — UPSL3</div>{subtitle&&<div style={{fontSize:12,opacity:.7,marginTop:2}}>{subtitle}</div>}</div></div><div style={S.sub}><span style={{color:"#fff",fontSize:11,fontWeight:600,letterSpacing:1}}>SISTEMA DE GESTÃO DE FOLGAS</span></div></>);}
function Avatar({nome,size=36}){const i=nome.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();return <div style={{width:size,height:size,borderRadius:"50%",background:COR,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.35,fontWeight:600,color:"#fff",flexShrink:0}}>{i}</div>;}
function Badge({status}){const s=STATUS_MAP[status]||STATUS_MAP.pendente;return <span style={{display:"inline-block",background:s.bg,color:s.color,padding:"4px 14px",borderRadius:99,fontSize:12,fontWeight:600}}>{s.label}</span>;}
function Btn({onClick,children,style={},variant="primary",disabled=false}){
  const vs={primary:{background:COR,color:"#fff",border:"none"},outline:{background:"none",border:`1px solid ${COR}`,color:COR},yellow:{background:"#eab308",color:"#fff",border:"none"},green:{background:"#16a34a",color:"#fff",border:"none"},red:{background:"#dc2626",color:"#fff",border:"none"}};
  return <button onClick={disabled?undefined:onClick} style={{padding:"8px 16px",borderRadius:6,cursor:disabled?"not-allowed":"pointer",fontWeight:600,fontSize:13,opacity:disabled?.6:1,...(vs[variant]||vs.primary),...style}}>{children}</button>;
}
function TabBar({tabs,labels,active,setActive}){return(<div style={{display:"flex",gap:2,marginBottom:"1.25rem",borderBottom:"1px solid #e5e7eb",overflowX:"auto"}}>{tabs.map(t=><button key={t} onClick={()=>setActive(t)} style={{padding:"8px 14px",background:"none",border:"none",borderBottom:active===t?`2px solid ${COR}`:"2px solid transparent",cursor:"pointer",fontWeight:active===t?600:400,fontSize:13,color:active===t?COR:"#6b7280",whiteSpace:"nowrap"}}>{labels[t]}</button>)}</div>);}

function App(){
  const [data,setData]=useState({servidores:[],tiposFolga:[],solicitacoes:[],funcoes:[],documentos:[]});
  const [screen,setScreen]=useState("home");
  const [adminPass,setAdminPass]=useState("");
  const [adminErr,setAdminErr]=useState("");
  const [loginMat,setLoginMat]=useState("");
  const [loginSen,setLoginSen]=useState("");
  const [loginErr,setLoginErr]=useState("");
  const [currentSrv,setCurrentSrv]=useState(null);
  const [adminTab,setAdminTab]=useState("servidores");
  const [loaded,setLoaded]=useState(false);
  const [saving,setSaving]=useState(false);
  useEffect(()=>{loadStorage().then(d=>{if(d)setData({documentos:[],...d});setLoaded(true);});},[]);
  async function persist(nd){setData(nd);setSaving(true);await saveStorage(nd);setSaving(false);}
  if(!loaded)return <div style={{padding:"2rem",color:"#6b7280",textAlign:"center"}}>⏳ Carregando dados...</div>;
  if(screen==="home")return(<div style={S.wrap}><Header/><div style={S.body}>
    {saving&&<p style={{fontSize:12,color:"#6b7280",marginBottom:8}}>💾 Salvando...</p>}
    <div style={{display:"grid",gap:10,marginTop:8}}>
      {[{label:"Painel do Administrador",desc:"Gerenciar servidores, folgas, documentos e solicitações",action:()=>setScreen("admin_login")},
        {label:"Painel do Servidor",desc:"Solicitar folgas, enviar documentos e acompanhar situações",action:()=>setScreen("servidor_login")}
      ].map(b=><button key={b.label} onClick={b.action} style={{padding:"14px 18px",textAlign:"left",borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer"}}><div style={{fontWeight:600,fontSize:15,color:COR}}>{b.label}</div><div style={{fontSize:13,color:"#6b7280",marginTop:3}}>{b.desc}</div></button>)}
    </div>
    <p style={{fontSize:11,color:"#9ca3af",textAlign:"center",marginTop:20}}>SEAP MA · UPSL3 · Sistema interno de controle de folgas</p>
  </div></div>);
  if(screen==="admin_login")return(<div style={S.wrap}><Header subtitle="Acesso do Administrador"/><div style={S.body}>
    <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",cursor:"pointer",color:"#6b7280",padding:0,fontSize:13,marginBottom:16}}>← Voltar</button>
    <label style={{fontSize:13,color:"#6b7280"}}>Senha</label>
    <input type="password" value={adminPass} onChange={e=>setAdminPass(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")adminPass===ADMIN_PASSWORD?(setAdminErr(""),setScreen("admin")):setAdminErr("Senha incorreta.");}} style={{marginTop:6,marginBottom:12}} placeholder="Senha do administrador"/>
    {adminErr&&<p style={{color:"#dc2626",fontSize:13,margin:"0 0 10px"}}>{adminErr}</p>}
    <Btn onClick={()=>{adminPass===ADMIN_PASSWORD?(setAdminErr(""),setScreen("admin")):setAdminErr("Senha incorreta.");}} style={{width:"100%",padding:10}}>Entrar</Btn>
  </div></div>);
  if(screen==="servidor_login")return(<div style={S.wrap}><Header subtitle="Acesso do Servidor"/><div style={S.body}>
    <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",cursor:"pointer",color:"#6b7280",padding:0,fontSize:13,marginBottom:16}}>← Voltar</button>
    <label style={{fontSize:13,color:"#6b7280"}}>Matrícula</label>
    <input value={loginMat} onChange={e=>setLoginMat(e.target.value)} style={{marginTop:6,marginBottom:12}} placeholder="Número da matrícula"/>
    <label style={{fontSize:13,color:"#6b7280"}}>Senha</label>
    <input type="password" value={loginSen} onChange={e=>setLoginSen(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){const s=data.servidores.find(x=>x.matricula===loginMat&&x.senha===loginSen);s?(setLoginErr(""),setCurrentSrv(s),setScreen("servidor")):setLoginErr("Matrícula ou senha incorretos.");}}} style={{marginTop:6,marginBottom:12}} placeholder="Sua senha"/>
    {loginErr&&<p style={{color:"#dc2626",fontSize:13,margin:"0 0 10px"}}>{loginErr}</p>}
    <Btn onClick={()=>{const s=data.servidores.find(x=>x.matricula===loginMat&&x.senha===loginSen);s?(setLoginErr(""),setCurrentSrv(s),setScreen("servidor")):setLoginErr("Matrícula ou senha incorretos.");}} style={{width:"100%",padding:10}}>Entrar</Btn>
  </div></div>);
  if(screen==="admin")return <AdminPanel data={data} persist={persist} goBack={()=>setScreen("home")} tab={adminTab} setTab={setAdminTab}/>;
  if(screen==="servidor")return <ServidorPanel servidor={currentSrv} data={data} persist={persist} goBack={()=>{setScreen("home");setCurrentSrv(null);setLoginMat("");setLoginSen("");}}/>;
  return null;
}

function AdminPanel({data,persist,goBack,tab,setTab}){
  const tabs=["servidores","tipos_folga","funcoes","solicitacoes","documentos"];
  const labels={servidores:"Servidores",tipos_folga:"Tipos de folga",funcoes:"Funções",solicitacoes:"Solicitações",documentos:"Documentos"};
  function exportFolgas(){exportCSV(data.solicitacoes.map(s=>{const srv=data.servidores.find(x=>x.id===s.servidorId),tipo=data.tiposFolga.find(x=>x.id===s.tipoFolgaId);return{Nome:srv?.nome||"—",Matrícula:srv?.matricula||"—",Função:srv?.funcao||"—",Regime:srv?.regime||"—","Tipo de Folga":tipo?.nome||"—",Data:s.data,Motivo:s.motivo||"",Status:STATUS_MAP[s.status]?.label||s.status,Observação:s.observacao||""};}), "folgas_upsl3.csv");}
  return(<div style={S.wrap}><Header subtitle="Painel do Administrador"/><div style={S.body}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.25rem"}}>
      <button onClick={goBack} style={{background:"none",border:"none",cursor:"pointer",color:"#6b7280",padding:0,fontSize:13}}>← Sair</button>
      <Btn onClick={exportFolgas} variant="outline">⬇ Exportar CSV</Btn>
    </div>
    <TabBar tabs={tabs} labels={labels} active={tab} setActive={setTab}/>
    {tab==="servidores"&&<AdminServidores data={data} persist={persist}/>}
    {tab==="tipos_folga"&&<AdminTipos data={data} persist={persist}/>}
    {tab==="funcoes"&&<AdminFuncoes data={data} persist={persist}/>}
    {tab==="solicitacoes"&&<AdminSolicitacoes data={data} persist={persist}/>}
    {tab==="documentos"&&<AdminDocumentos data={data} persist={persist}/>}
  </div></div>);
}

function AdminServidores({data,persist}){
  const init={nome:"",matricula:"",funcao:"",senha:"",regime:"Diarista",turno:"Dia",plantao:"A",inicioPlantao:""};
  const [form,setForm]=useState(init);
  const [saldos,setSaldos]=useState({});
  const [err,setErr]=useState("");
  const [editId,setEditId]=useState(null);
  const [editSaldo,setEditSaldo]=useState(null);
  const pl=["Plantonista 12x36","Chefe 24x72"].includes(form.regime);
  function add(){
    if(!form.nome||!form.matricula||!form.senha){setErr("Preencha nome, matrícula e senha.");return;}
    if(data.servidores.find(s=>s.matricula===form.matricula)){setErr("Matrícula já cadastrada.");return;}
    if(pl&&!form.inicioPlantao){setErr("Informe a data de início do plantão.");return;}
    const si={};data.tiposFolga.forEach(t=>{si[t.id]=parseInt(saldos[t.id])||0;});
    persist({...data,servidores:[...data.servidores,{id:genId(),...form,saldos:si}]});
    setForm(init);setSaldos({});setErr("");
  }
  return(<div>
    <div style={{background:"#f9fafb",borderRadius:8,padding:"1rem",marginBottom:"1.5rem",border:"1px solid #e5e7eb"}}>
      <p style={{margin:"0 0 12px",fontWeight:600,fontSize:14}}>Novo servidor</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{gridColumn:"1/-1"}}><label style={{fontSize:12,color:"#6b7280"}}>Nome completo</label><input value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} style={{marginTop:4}}/></div>
        <div><label style={{fontSize:12,color:"#6b7280"}}>Matrícula</label><input value={form.matricula} onChange={e=>setForm({...form,matricula:e.target.value})} style={{marginTop:4}}/></div>
        <div><label style={{fontSize:12,color:"#6b7280"}}>Senha</label><input type="password" value={form.senha} onChange={e=>setForm({...form,senha:e.target.value})} style={{marginTop:4}}/></div>
        <div><label style={{fontSize:12,color:"#6b7280"}}>Função</label><select value={form.funcao} onChange={e=>setForm({...form,funcao:e.target.value})} style={{marginTop:4}}><option value="">Selecione</option>{data.funcoes.map(f=><option key={f.id} value={f.nome}>{f.nome}</option>)}</select></div>
        <div><label style={{fontSize:12,color:"#6b7280"}}>Regime</label><select value={form.regime} onChange={e=>setForm({...form,regime:e.target.value})} style={{marginTop:4}}>{REGIMES.map(r=><option key={r} value={r}>{r}</option>)}</select></div>
        {pl&&form.regime==="Plantonista 12x36"&&<div><label style={{fontSize:12,color:"#6b7280"}}>Turno</label><select value={form.turno} onChange={e=>setForm({...form,turno:e.target.value})} style={{marginTop:4}}>{TURNOS.map(t=><option key={t} value={t}>{t}</option>)}</select></div>}
        {pl&&<><div><label style={{fontSize:12,color:"#6b7280"}}>Plantão</label><select value={form.plantao} onChange={e=>setForm({...form,plantao:e.target.value})} style={{marginTop:4}}>{PLANTOES.map(p=><option key={p} value={p}>Plantão {p}</option>)}</select></div>
        <div><label style={{fontSize:12,color:"#6b7280"}}>Início do plantão</label><input type="date" value={form.inicioPlantao} onChange={e=>setForm({...form,inicioPlantao:e.target.value})} style={{marginTop:4}}/></div></>}
      </div>
      {data.tiposFolga.length>0&&<div style={{marginTop:12}}><p style={{fontSize:12,color:"#6b7280",margin:"0 0 8px"}}>Saldo inicial por tipo de folga</p><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8}}>{data.tiposFolga.map(t=><div key={t.id}><label style={{fontSize:12,color:"#6b7280"}}>{t.nome}</label><input type="number" min="0" value={saldos[t.id]||""} onChange={e=>setSaldos({...saldos,[t.id]:e.target.value})} style={{marginTop:4}}/></div>)}</div></div>}
      {err&&<p style={{color:"#dc2626",fontSize:13,margin:"8px 0 0"}}>{err}</p>}
      <Btn onClick={add} style={{marginTop:12}}>Cadastrar servidor</Btn>
    </div>
    <div style={{display:"grid",gap:10}}>
      {data.servidores.length===0&&<p style={{color:"#6b7280",fontSize:14}}>Nenhum servidor cadastrado.</p>}
      {data.servidores.map(srv=><div key={srv.id} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:"1rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <Avatar nome={srv.nome}/>
          <div style={{flex:1}}><p style={{margin:0,fontWeight:600,fontSize:14}}>{srv.nome}</p><p style={{margin:0,fontSize:12,color:"#6b7280"}}>Mat. {srv.matricula} · {srv.funcao||"Sem função"} · {srv.regime}{["Plantonista 12x36","Chefe 24x72"].includes(srv.regime)&&` · Plantão ${srv.plantao||"?"}`}{srv.regime==="Plantonista 12x36"&&` · Turno ${srv.turno||"?"}`}</p></div>
          <button onClick={()=>{setEditId(srv.id);setEditSaldo({...srv.saldos});}} style={{background:"none",border:"1px solid #d1d5db",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>Saldos</button>
          <button onClick={()=>persist({...data,servidores:data.servidores.filter(s=>s.id!==srv.id)})} style={{background:"none",border:"1px solid #dc2626",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12,color:"#dc2626"}}>Remover</button>
        </div>
        {editId===srv.id?<div style={{borderTop:"1px solid #e5e7eb",paddingTop:10,marginTop:4}}>
          <p style={{fontSize:13,fontWeight:600,margin:"0 0 8px"}}>Editar saldos</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:10}}>{data.tiposFolga.map(t=><div key={t.id}><label style={{fontSize:12,color:"#6b7280"}}>{t.nome}</label><input type="number" min="0" value={editSaldo?.[t.id]??""} onChange={e=>setEditSaldo({...editSaldo,[t.id]:parseInt(e.target.value)||0})} style={{marginTop:4}}/></div>)}</div>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={()=>{persist({...data,servidores:data.servidores.map(s=>s.id===srv.id?{...s,saldos:{...s.saldos,...editSaldo}}:s)});setEditId(null);setEditSaldo(null);}}>Salvar</Btn>
            <button onClick={()=>{setEditId(null);setEditSaldo(null);}} style={{padding:"6px 14px",borderRadius:6,border:"1px solid #d1d5db",cursor:"pointer",fontSize:13}}>Cancelar</button>
          </div>
        </div>:<div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>{data.tiposFolga.map(t=><span key={t.id} style={{fontSize:12,background:"#f3f4f6",padding:"2px 10px",borderRadius:99,color:"#6b7280"}}>{t.nome}: <strong>{srv.saldos?.[t.id]??0}</strong></span>)}</div>}
      </div>)}
    </div>
  </div>);
}

}

}

function AdminSolicitacoes({data,persist}){
  const [obs,setObs]=useState({});
  const [filtro,setFiltro]=useState("todas");
  function decidir(sol,novoStatus){
    const updated=data.solicitacoes.map(s=>s.id===sol.id?{...s,status:novoStatus,observacao:obs[sol.id]||s.observacao||""}:s);
    let servidores=data.servidores;
    if(novoStatus==="deferida")servidores=data.servidores.map(s=>s.id===sol.servidorId?{...s,saldos:{...s.saldos,[sol.tipoFolgaId]:Math.max(0,(s.saldos?.[sol.tipoFolgaId]||0)-1)}}:s);
    persist({...data,solicitacoes:updated,servidores});
  }
  const lista=data.solicitacoes.filter(s=>filtro==="todas"||s.status===filtro).sort((a,b)=>b.criadoEm-a.criadoEm);
  return(<div>
    <div style={{display:"flex",gap:6,marginBottom:"1.25rem",flexWrap:"wrap"}}>
      {[{v:"todas",l:"Todas"},{v:"pendente",l:"Pendente"},{v:"emanalise",l:"Em análise"},{v:"deferida",l:"Deferida"},{v:"indeferida",l:"Indeferida"}].map(f=><button key={f.v} onClick={()=>setFiltro(f.v)} style={{padding:"5px 14px",borderRadius:99,border:"1px solid #d1d5db",cursor:"pointer",fontWeight:filtro===f.v?600:400,background:filtro===f.v?COR:"none",color:filtro===f.v?"#fff":"#6b7280",fontSize:13}}>{f.l}</button>)}
    </div>
    {lista.length===0&&<p style={{color:"#6b7280",fontSize:14}}>Nenhuma solicitação.</p>}
    <div style={{display:"grid",gap:12}}>
      {lista.map(sol=>{
        const srv=data.servidores.find(s=>s.id===sol.servidorId),tipo=data.tiposFolga.find(t=>t.id===sol.tipoFolgaId);
        const pendente=sol.status==="pendente"||sol.status==="emanalise";
        return(<div key={sol.id} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:"1rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            {srv&&<Avatar nome={srv.nome} size={32}/>}
            <div style={{flex:1}}><p style={{margin:0,fontWeight:600,fontSize:14}}>{srv?.nome||"Servidor removido"}</p><p style={{margin:0,fontSize:12,color:"#6b7280"}}>{srv?.funcao} · {srv?.regime} · Mat. {srv?.matricula}</p></div>
            <Badge status={sol.status}/>
          </div>
          <div style={{fontSize:13,color:"#6b7280",display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:pendente?10:0}}>
            <span><strong>Tipo:</strong> {tipo?.nome||"—"}</span><span><strong>Data:</strong> {sol.data}</span>
            {sol.motivo&&<span style={{gridColumn:"1/-1"}}><strong>Motivo:</strong> {sol.motivo}</span>}
            {sol.observacao&&<span style={{gridColumn:"1/-1"}}><strong>Obs.:</strong> {sol.observacao}</span>}
          </div>
          {pendente&&<div style={{borderTop:"1px solid #e5e7eb",paddingTop:10}}>
            <input placeholder="Observação (opcional)" value={obs[sol.id]||""} onChange={e=>setObs({...obs,[sol.id]:e.target.value})} style={{marginBottom:10}}/>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Btn variant="yellow" onClick={()=>decidir(sol,"emanalise")}>Em análise</Btn>
              <Btn variant="green" onClick={()=>decidir(sol,"deferida")}>Deferir</Btn>
              <Btn variant="red" onClick={()=>decidir(sol,"indeferida")}>Indeferir</Btn>
            </div>
          </div>}
        </div>);
      })}
    </div>
  </div>);
}

function AdminDocumentos({data,persist}){
  const [filtroSrv,setFiltroSrv]=useState("");
  const docs=(filtroSrv?data.documentos.filter(d=>d.servidorId===filtroSrv):data.documentos).sort((a,b)=>b.criadoEm-a.criadoEm);
  function exportarRelacao(){exportCSV(data.documentos.map(doc=>{const srv=data.servidores.find(s=>s.id===doc.servidorId);return{Nome:srv?.nome||"—",Matrícula:srv?.matricula||"—",Função:srv?.funcao||"—","Tipo":doc.tipoDoc,"Data da Falta":doc.dataFalta,"Arquivo":doc.nomeArquivo,"Enviado por":doc.enviadoPor==="admin"?"Administrador":"Servidor"};}), "documentos_upsl3.csv");}
  return(<div>
    <UploadDocumento data={data} persist={persist} isAdmin={true}/>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",margin:"1.5rem 0 1rem"}}>
      <select value={filtroSrv} onChange={e=>setFiltroSrv(e.target.value)} style={{width:"auto",fontSize:13}}><option value="">Todos os servidores</option>{data.servidores.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}</select>
      <Btn onClick={exportarRelacao} variant="outline">⬇ Exportar relação CSV</Btn>
    </div>
    {docs.length===0&&<p style={{color:"#6b7280",fontSize:14}}>Nenhum documento enviado.</p>}
    <div style={{display:"grid",gap:10}}>
      {docs.map(doc=>{const srv=data.servidores.find(s=>s.id===doc.servidorId);return(<div key={doc.id} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:"1rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>{srv&&<Avatar nome={srv.nome} size={30}/>}<div style={{flex:1}}><p style={{margin:0,fontWeight:600,fontSize:14}}>{srv?.nome||"—"}</p><p style={{margin:0,fontSize:12,color:"#6b7280"}}>{srv?.funcao||"—"} · Mat. {srv?.matricula||"—"}</p></div><span style={{fontSize:12,background:"#f3f4f6",padding:"2px 10px",borderRadius:99,color:"#6b7280"}}>{doc.tipoDoc}</span></div>
        <div style={{fontSize:13,color:"#6b7280",marginBottom:10}}><span><strong>Data da falta:</strong> {doc.dataFalta}</span><span style={{marginLeft:16}}><strong>Arquivo:</strong> {doc.nomeArquivo}</span></div>
        <div style={{display:"flex",gap:8}}><Btn onClick={()=>downloadBase64(doc.base64,doc.nomeArquivo)}>⬇ Baixar</Btn><button onClick={()=>persist({...data,documentos:data.documentos.filter(d=>d.id!==doc.id)})} style={{padding:"6px 14px",borderRadius:6,border:"1px solid #dc2626",cursor:"pointer",fontSize:13,color:"#dc2626",background:"none"}}>Remover</button></div>
      </div>);})}
    </div>
  </div>);
}

function UploadDocumento({data,persist,isAdmin,servidorId}){
  const [form,setForm]=useState({servidorId:servidorId||"",tipoDoc:TIPOS_DOC[0],dataFalta:""});
  const [arquivo,setArquivo]=useState(null);
  const [uploading,setUploading]=useState(false);
  const [ok,setOk]=useState(false);
  const [err,setErr]=useState("");
  const fileRef=useRef();
  async function enviar(){
    if(isAdmin&&!form.servidorId){setErr("Selecione o servidor.");return;}
    if(!form.dataFalta){setErr("Informe a data da falta.");return;}
    if(!arquivo){setErr("Selecione um arquivo.");return;}
    if(!["application/pdf","image/jpeg","image/jpg"].includes(arquivo.type)){setErr("Apenas PDF ou JPG são aceitos.");return;}
    if(arquivo.size>5*1024*1024){setErr("Arquivo muito grande. Máximo 5MB.");return;}
    setUploading(true);setErr("");
    try{
      const b64=await fileToBase64(arquivo);
      const docObj={id:genId(),servidorId:isAdmin?form.servidorId:servidorId,tipoDoc:form.tipoDoc,dataFalta:form.dataFalta,nomeArquivo:arquivo.name,base64:b64,enviadoPor:isAdmin?"admin":"servidor",criadoEm:Date.now()};
      persist({...data,documentos:[...(data.documentos||[]),docObj]});
      setForm({servidorId:servidorId||"",tipoDoc:TIPOS_DOC[0],dataFalta:""});
      setArquivo(null);if(fileRef.current)fileRef.current.value="";
      setOk(true);setTimeout(()=>setOk(false),3000);
    }catch(e){setErr("Erro ao processar o arquivo.");}
    setUploading(false);
  }
  return(<div style={{background:"#f9fafb",borderRadius:8,padding:"1rem",marginBottom:"1rem",border:"1px solid #e5e7eb"}}>
    <p style={{margin:"0 0 12px",fontWeight:600,fontSize:14}}>Enviar documento</p>
    {ok&&<p style={{color:"#16a34a",fontSize:13,margin:"0 0 10px"}}>Documento enviado com sucesso!</p>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {isAdmin&&<div style={{gridColumn:"1/-1"}}><label style={{fontSize:12,color:"#6b7280"}}>Servidor</label><select value={form.servidorId} onChange={e=>setForm({...form,servidorId:e.target.value})} style={{marginTop:4}}><option value="">Selecione o servidor</option>{data.servidores.map(s=><option key={s.id} value={s.id}>{s.nome} — Mat. {s.matricula}</option>)}</select></div>}
      <div><label style={{fontSize:12,color:"#6b7280"}}>Tipo de documento</label><select value={form.tipoDoc} onChange={e=>setForm({...form,tipoDoc:e.target.value})} style={{marginTop:4}}>{TIPOS_DOC.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
      <div><label style={{fontSize:12,color:"#6b7280"}}>Data da falta</label><input type="date" value={form.dataFalta} onChange={e=>setForm({...form,dataFalta:e.target.value})} style={{marginTop:4}}/></div>
      <div style={{gridColumn:"1/-1"}}><label style={{fontSize:12,color:"#6b7280"}}>Arquivo (PDF ou JPG, máx. 5MB)</label><input ref={fileRef} type="file" accept=".pdf,.jpg,.jpeg" onChange={e=>setArquivo(e.target.files[0]||null)} style={{marginTop:4}}/>{arquivo&&<p style={{fontSize:12,color:"#6b7280",margin:"4px 0 0"}}>{arquivo.name} ({(arquivo.size/1024).toFixed(0)} KB)</p>}</div>
    </div>
    {err&&<p style={{color:"#dc2626",fontSize:13,margin:"8px 0 0"}}>{err}</p>}
    <Btn onClick={enviar} style={{marginTop:12}} disabled={uploading}>{uploading?"Enviando...":"Enviar documento"}</Btn>
  </div>);
}

function ServidorPanel({servidor,data,persist,goBack}){
  const [tab,setTab]=useState("solicitar");
  const srv=data.servidores.find(s=>s.id===servidor.id);
  return(<div style={S.wrap}><Header subtitle={`Servidor — ${servidor.nome}`}/><div style={S.body}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1rem"}}>
      <button onClick={goBack} style={{background:"none",border:"none",cursor:"pointer",color:"#6b7280",padding:0,fontSize:13}}>← Sair</button>
      <Avatar nome={servidor.nome} size={30}/>
      <div><p style={{margin:0,fontWeight:600,fontSize:14}}>{servidor.nome}</p><p style={{margin:0,fontSize:12,color:"#6b7280"}}>{servidor.funcao} · {servidor.regime} · Mat. {servidor.matricula}</p></div>
    </div>
    {srv&&data.tiposFolga.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:"1rem"}}>{data.tiposFolga.map(t=><span key={t.id} style={{background:"#f3f4f6",border:"1px solid #e5e7eb",borderRadius:99,padding:"3px 12px",fontSize:13}}>{t.nome}: <strong>{srv.saldos?.[t.id]??0}</strong></span>)}</div>}
    <TabBar tabs={["solicitar","documentos","historico"]} labels={{solicitar:"Solicitar folga",documentos:"Documentos",historico:"Histórico"}} active={tab} setActive={setTab}/>
    {tab==="solicitar"&&<SolicitarFolga servidor={servidor} data={data} persist={persist}/>}
    {tab==="documentos"&&<ServidorDocumentos servidor={servidor} data={data} persist={persist}/>}
    {tab==="historico"&&<HistoricoFolgas servidor={servidor} data={data}/>}
  </div></div>);
}

function SolicitarFolga({servidor,data,persist}){
  const [form,setForm]=useState({tipoFolgaId:"",data:"",motivo:""});
  const [erros,setErros]=useState([]);
  const [ok,setOk]=useState(false);
  function solicitar(){
    try{
      const msgs=[];
      if(!form.tipoFolgaId)msgs.push("Selecione o tipo de folga.");
      if(!form.data)msgs.push("Selecione a data da folga.");
      if(msgs.length>0){setErros(msgs);return;}
      const srvAtual=data.servidores.find(s=>s.id===servidor.id);
      if(!srvAtual){setErros(["Servidor não encontrado."]);return;}
      const saldo=(srvAtual.saldos&&srvAtual.saldos[form.tipoFolgaId]!=null)?srvAtual.saldos[form.tipoFolgaId]:0;
      if(saldo<=0){setErros([`Saldo zerado (saldo: ${saldo}).`]);return;}
      const ev=validar(srvAtual,form.data,data.solicitacoes,data.servidores);
      if(ev.length>0){setErros(ev);return;}
      persist({...data,solicitacoes:[...data.solicitacoes,{id:genId(),servidorId:servidor.id,tipoFolgaId:form.tipoFolgaId,data:form.data,motivo:form.motivo||"",status:"pendente",criadoEm:Date.now(),observacao:""}]});
      setForm({tipoFolgaId:"",data:"",motivo:""});setErros([]);setOk(true);setTimeout(()=>setOk(false),4000);
    }catch(e){setErros(["Erro: "+e.message]);}
  }
  const srv=data.servidores.find(s=>s.id===servidor.id);
  if(data.tiposFolga.length===0)return <p style={{color:"#6b7280",fontSize:14}}>Nenhum tipo de folga cadastrado. Fale com o administrador.</p>;
  return(<div>
    {ok&&<p style={{color:"#16a34a",fontSize:14,marginBottom:12,fontWeight:600}}>✓ Solicitação enviada com sucesso!</p>}
    <div style={{display:"grid",gap:12}}>
      <div><label style={{fontSize:13,color:"#6b7280"}}>Tipo de folga</label><select value={form.tipoFolgaId} onChange={e=>setForm({...form,tipoFolgaId:e.target.value})} style={{marginTop:6}}><option value="">Selecione</option>{data.tiposFolga.map(t=><option key={t.id} value={t.id}>{t.nome} (saldo: {srv?.saldos?.[t.id]??0})</option>)}</select></div>
      <div><label style={{fontSize:13,color:"#6b7280"}}>Data da folga</label><input type="date" value={form.data} onChange={e=>setForm({...form,data:e.target.value})} style={{marginTop:6}}/></div>
      <div><label style={{fontSize:13,color:"#6b7280"}}>Motivo (opcional)</label><input value={form.motivo} onChange={e=>setForm({...form,motivo:e.target.value})} style={{marginTop:6}} placeholder="Descreva o motivo"/></div>
      {erros.length>0&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,padding:"10px 14px"}}>{erros.map((e,i)=><p key={i} style={{color:"#dc2626",fontSize:13,margin:i>0?"4px 0 0":0}}>• {e}</p>)}</div>}
      <Btn onClick={solicitar} style={{padding:10,width:"100%"}}>Enviar solicitação</Btn>
    </div>
  </div>);
}

function ServidorDocumentos({servidor,data,persist}){
  const meusDocs=(data.documentos||[]).filter(d=>d.servidorId===servidor.id).sort((a,b)=>b.criadoEm-a.criadoEm);
  return(<div>
    <UploadDocumento data={data} persist={persist} isAdmin={false} servidorId={servidor.id}/>
    {meusDocs.length===0&&<p style={{color:"#6b7280",fontSize:14}}>Nenhum documento enviado.</p>}
    <div style={{display:"grid",gap:10}}>
      {meusDocs.map(doc=><div key={doc.id} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:"1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontWeight:600,fontSize:14}}>{doc.tipoDoc}</span><span style={{fontSize:12,background:"#f3f4f6",padding:"2px 10px",borderRadius:99,color:"#6b7280"}}>{doc.enviadoPor==="admin"?"Enviado pelo admin":"Enviado por você"}</span></div>
        <p style={{margin:"0 0 4px",fontSize:13,color:"#6b7280"}}>Data da falta: {doc.dataFalta}</p>
        <p style={{margin:"0 0 10px",fontSize:13,color:"#6b7280"}}>Arquivo: {doc.nomeArquivo}</p>
        <Btn onClick={()=>downloadBase64(doc.base64,doc.nomeArquivo)}>⬇ Baixar</Btn>
      </div>)}
    </div>
  </div>);
}

function HistoricoFolgas({servidor,data}){
  const lista=data.solicitacoes.filter(s=>s.servidorId===servidor.id).sort((a,b)=>b.criadoEm-a.criadoEm);
  return(<div>
    {lista.length===0&&<p style={{color:"#6b7280",fontSize:14}}>Nenhuma solicitação enviada.</p>}
    <div style={{display:"grid",gap:10}}>
      {lista.map(sol=>{const tipo=data.tiposFolga.find(t=>t.id===sol.tipoFolgaId);return(<div key={sol.id} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:"1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontWeight:600,fontSize:14}}>{tipo?.nome||"—"}</span><Badge status={sol.status}/></div>
        <p style={{margin:"0 0 3px",fontSize:13,color:"#6b7280"}}>Data: {sol.data}</p>
        {sol.motivo&&<p style={{margin:"0 0 3px",fontSize:13,color:"#6b7280"}}>Motivo: {sol.motivo}</p>}
        {sol.observacao&&<p style={{margin:0,fontSize:13,color:"#6b7280"}}>Obs.: {sol.observacao}</p>}
      </div>);})}
    </div>
  </div>);
}
